name: Actualizador de Eventos Deportivos

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Esto obliga a traer TODO el historial nuevo

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Esto ayuda a limpiar versiones viejas

      - name: Instalar dependencias
        run: npm install axios

      - name: Ejecutar Robot de Arbitraje
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Comando para asegurar que estamos usando el archivo real
          cat scripts/arbitraje.js 
          node scripts/arbitraje.js

      - name: Guardar cambios
        run: |
          git config --global user.name 'SportLive Bot'
          git config --global user.email 'bot@sportlive.com'
          git add data/eventos-auto.json
          git commit -m "Noticias generadas exitosamente" || exit 0
          git push