// ðĻ FunciÃģn para compartir web (URL Limpia)
    function compartirWeb() {
        const urlLimpia = "https://oleadatvpremium.com/app"; // ðĨ AquÃ­ definimos la URL bonita
        
        if (navigator.share) {
            navigator.share({
                title: 'SportLive Premium',
                text: 'ðĨ ÂĄÃnete a SportLive Premium! La mejor App para ver FÃštbol, Cine y TV en vivo. 100% Gratis.',
                url: urlLimpia
            });
        } else {
            // Si el navegador no soporta compartir nativo, copia al portapapeles
            navigator.clipboard.writeText(urlLimpia).then(() => {
                alert("ÂĄEnlace copiado al portapapeles! " + urlLimpia);
            });
        }
    }

    // Navegaciïŋ―ïŋ―n Segura para los canales (Oculta la URL inferior)
    function navegarSeguro(url) {
        window.location.href = url;
    }

    // ==========================================
    // Lïŋ―0ïŋ―7GICA DE CANALES, FAVORITOS Y BUSCADOR
    // ==========================================
    let allData = {};
    let currentCategory = "TODOS";
    const container = document.getElementById('cardsContainer');
    const categoryBox = document.getElementById('categoryButtons');
    const searchInput = document.getElementById('myInput');

    // Inicializar Favoritos desde LocalStorage
    let userFavorites = JSON.parse(localStorage.getItem('sportlive_favs')) || [];

    const normalizeText = (text) => {
        return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    };

    function getUniqueCount(channelArray) {
        const unique = new Set();
        channelArray.forEach(c => {
            if(c.Estado !== "Inactivo") {
                unique.add(c.Canal.toLowerCase().replace(/\s+/g, '').replace(/\+/g, 'plus'));
            }
        });
        return unique.size;
    }

    // Toggle de Favorito
    window.toggleFavorite = (e, canalId) => {
        e.preventDefault(); 
        e.stopPropagation();
        const btn = e.currentTarget;
        
        if (userFavorites.includes(canalId)) {
            userFavorites = userFavorites.filter(id => id !== canalId);
            btn.classList.remove('active');
            btn.innerHTML = '<i class="far fa-heart"></i>';
        } else {
            userFavorites.push(canalId);
            btn.classList.add('active');
            btn.innerHTML = '<i class="fas fa-heart"></i>';
        }
        
        localStorage.setItem('sportlive_favs', JSON.stringify(userFavorites));
        
        if (currentCategory === "FAVORITOS") {
            renderChannels(currentCategory, searchInput ? searchInput.value : "");
            renderCategories(); 
        } else {
            renderCategoriesSilent();
        }
    };

    function renderCategoriesSilent() {
        const activeBtn = document.querySelector('.section-button.active');
        renderCategories();
        if(activeBtn) {
            const newBtns = document.querySelectorAll('.section-button');
            newBtns.forEach(b => {
                if(b.innerText.includes(activeBtn.innerText.split(' ')[0])) {
                    b.classList.add('active');
                }
            });
        }
    }

    // Renderizar botones de categorïŋ―ïŋ―as
    function renderCategories() {
        if (!categoryBox) return;
        
        let allChannelsRaw = [];
        Object.values(allData).forEach(arr => allChannelsRaw = allChannelsRaw.concat(arr));
        
        const countTodos = getUniqueCount(allChannelsRaw);
        
        let favCount = 0;
        if (userFavorites.length > 0) {
            const uniqueFavs = new Set();
            allChannelsRaw.forEach(c => {
                const cleanId = c.Canal.toLowerCase().replace(/\s+/g, '').replace(/\+/g, 'plus');
                if (userFavorites.includes(cleanId) && c.Estado !== "Inactivo") {
                    uniqueFavs.add(cleanId);
                }
            });
            favCount = uniqueFavs.size;
        }

        let html = "";
        
        // 1. Botïŋ―ïŋ―n TODOS (Siempre primero)
        const isTodosActive = currentCategory === "TODOS" ? "active" : "";
        html += `<div class="section-button ${isTodosActive}" onclick="filterCat('TODOS', this)">TODOS <span class="cat-count">${countTodos}</span></div>`;

        // 2. Botïŋ―ïŋ―n Favoritos (Siempre segundo si existe. Corregido con icono HTML puro)
        if (favCount > 0) {
            const isActive = currentCategory === "FAVORITOS" ? "active" : "";
            html += `<div class="section-button ${isActive}" onclick="filterCat('FAVORITOS', this)"><i class="fas fa-heart" style="color: #ef4444;"></i> FAVORITOS <span class="cat-count" style="background:rgba(239, 68, 68, 0.4);">${favCount}</span></div>`;
        }

        // 3. Buscar y agregar las categorïŋ―ïŋ―as de Eventos primero
        Object.keys(allData).forEach(cat => {
            if (cat.toUpperCase().includes("EVENTO")) {
                const count = getUniqueCount(allData[cat]);
                if(count > 0) {
                    const isActive = currentCategory === cat ? "active" : "";
                    html += `<div class="section-button ${isActive}" onclick="filterCat('${cat}', this)">${cat} <span class="cat-count">${count}</span></div>`;
                }
            }
        });

        // 4. Agregar el resto de categorïŋ―ïŋ―as (Saltando las de eventos que ya agregamos)
// 4. Agregar el resto de categorÃ­as (Saltando Eventos y CINE 24/7)
        Object.keys(allData).forEach(cat => {
            const catUpper = cat.toUpperCase();
            // ðĨ AQUÃ ESTÃ EL FILTRO: Ignorar "EVENTO" y "CINE 24/7"
            if (!catUpper.includes("EVENTO") && !catUpper.includes("CINE 24/7")) {
                const count = getUniqueCount(allData[cat]);
                if(count > 0) {
                    const isActive = currentCategory === cat ? "active" : "";
                    html += `<div class="section-button ${isActive}" onclick="filterCat('${cat}', this)">${cat} <span class="cat-count">${count}</span></div>`;
                }
            }
        });
        
        categoryBox.innerHTML = html;
    }

    window.filterCat = (category, btn) => {
        currentCategory = category;
        const buttons = document.querySelectorAll('.section-button');
        buttons.forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        
        if(searchInput) searchInput.value = ""; 
        renderChannels(currentCategory, "");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function renderChannels(category, filterText = "") {
        if (!container) return;
        container.innerHTML = "";
        let channelsToDisplay = [];
        let allChannelsList = [];

        Object.values(allData).forEach(arr => allChannelsList = allChannelsList.concat(arr));

        if (category === "TODOS") {
            channelsToDisplay = allChannelsList;
        } else if (category === "FAVORITOS") {
            channelsToDisplay = allChannelsList.filter(c => {
                const id = c.Canal.toLowerCase().replace(/\s+/g, '').replace(/\+/g, 'plus');
                return userFavorites.includes(id);
            });
        } else {
            channelsToDisplay = allData[category] || [];
        }

        if (filterText.trim() !== "") {
            const term = normalizeText(filterText);
            channelsToDisplay = channelsToDisplay.filter(c => 
                c.Canal && normalizeText(c.Canal).includes(term)
            );
        }

        const nombresRenderizados = new Set();

        if (channelsToDisplay.length === 0) {
            container.innerHTML = `<p style='text-align:center; width:100%; grid-column: 1 / -1; padding:50px; color:#64748b;'><i class="fas fa-satellite-dish" style="font-size:30px; margin-bottom:10px; display:block;"></i>No hay canales aquïŋ―ïŋ―.</p>`;
            return;
        }

        channelsToDisplay.forEach(c => {
            if (c.Estado === "Inactivo") return;
            
            const cleanId = c.Canal.toLowerCase().replace(/\s+/g, '').replace(/\+/g, 'plus');
            if (nombresRenderizados.has(cleanId)) return;
            nombresRenderizados.add(cleanId);

            const isFav = userFavorites.includes(cleanId);
            const favIcon = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
            const favClass = isFav ? 'active' : '';

            // ïŋ―0ïŋ―4 VERIFICAR SI EL CANAL PERTENECE A UNA CATEGORïŋ―0ïŋ―1A DE "EVENTO" ïŋ―0ïŋ―4
            const isEvento = c.parentCategory && c.parentCategory.toUpperCase().includes("EVENTO");
            const eventoClass = isEvento ? 'evento-style' : '';
            const eventoBadge = isEvento ? '<div class="badge-evento">EN VIVO</div>' : '';

            const li = document.createElement('li');
            li.className = 'card-wrapper';
            const linkFinal = `ver.html?canal=${cleanId}`;
            
            const fallbackLogo = `https://ui-avatars.com/api/?name=${encodeURIComponent(c.Canal)}&background=1e3a8a&color=fff&bold=true&font-size=0.35&rounded=true`;
            const logoUrl = c.Logo || fallbackLogo;

            // Inyectar el CSS especial y la etiqueta si es un evento
            li.innerHTML = `
                <button class="fav-btn ${favClass}" onclick="toggleFavorite(event, '${cleanId}')" title="Aïŋ―0ïŋ―9adir a Favoritos">
                    ${favIcon}
                </button>
                <div class="card ${eventoClass}" onclick="navegarSeguro('${linkFinal}')">
                    ${eventoBadge}
                    <img src="${logoUrl}" alt="${c.Canal}" loading="lazy" onerror="this.onerror=null; this.src='${fallbackLogo}';">
                    <span>${c.Canal}</span>
                </div>
            `;
            container.appendChild(li);
        });
    }

    async function loadData() {
        try {
            const response = await fetch('https://api.telelatinomax.shop/canales.php', {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            if (!response.ok) throw new Error("No se pudo cargar el archivo");
            
            allData = await response.json();
            if(allData.error) { throw new Error(allData.error); }

            // ïŋ―0ïŋ―4 ETIQUETAR CADA CANAL CON SU CATEGORïŋ―0ïŋ―1A PADRE PARA SABER SI ES EVENTO ïŋ―0ïŋ―4
            Object.keys(allData).forEach(cat => {
                allData[cat].forEach(c => c.parentCategory = cat);
            });

            renderCategories();
            renderChannels(currentCategory);
        } catch (e) {
            console.error("Error cargando canales:", e);
            if (container) {
                container.innerHTML = `<p style='text-align:center; padding:50px; color:#ef4444;'><i class="fas fa-exclamation-triangle"></i> Servidor protegido o en mantenimiento.</p>`;
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const menuBtn = document.getElementById('menuButton');
        const menuDropdown = document.getElementById('menuDropdown');

        if (menuBtn && menuDropdown) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menuDropdown.classList.toggle('active');
            });
            document.addEventListener('click', () => {
                menuDropdown.classList.remove('active');
            });
        }

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value;
                if (term.trim() !== "") {
                    renderChannels("TODOS", term);
                } else {
                    renderChannels(currentCategory, "");
                }
            });
        }

        loadData();
    });
</script>

    // 2. LÃģgica de InstalaciÃģn PWA
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const btnInstalar = document.getElementById('btn-instalar-app');

    window.addEventListener('beforeinstallprompt', (e) => {
        // Prevenir el banner nativo de Google (Queremos mostrar el nuestro que es mÃĄs bonito)
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
    });

    btnInstalar.addEventListener('click', async () => {
        installBanner.style.display = 'none';
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`El usuario decidiÃģ: ${outcome}`);
            deferredPrompt = null;
        }
    });

    // Detectar iOS (Apple no deja instalar automÃĄtico, hay que enseÃąarles cÃģmo)
    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test( userAgent );
    }
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {

    }
  </script>
