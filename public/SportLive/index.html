<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SportLive Premium | Eventos Deportivos, TV y Cine en VIVO Gratis</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#080c14">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=SL&background=3b82f6&color=fff&size=192">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" href="https://i.postimg.cc/fyL6vn3H/unnamed-1.png" type="image/x-icon">

  <meta name="description" content="Accede a la mejor plataforma de streaming. SportLive Premium te ofrece canales de TV online en vivo, eventos deportivos exclusivos y estrenos de cine gratis por internet.">
  <meta name="keywords" content="Fútbol Libre, canales de TV online, eventos deportivos, streaming gratis, cine online, tv en vivo">
  <meta name="author" content="SportLive">
  <meta property="og:site_name" content="SPORTLIVE PREMIUM | STREAMING ONLINE">
  <meta property="og:url" content="https://oleadatvpremium.com">
  <meta property="og:image" content="https://i.postimg.cc/fyL6vn3H/unnamed-1.png">

<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 🔥 AJUSTE PARA EVITAR SCROLL Y ADAPTARSE A LA PANTALLA PERFECTAMENTE 🔥 */
    html, body {
      width: 100%;
      height: 100%; /* Forzar altura estricta */
      height: 100dvh; /* Altura dinámica para celulares modernos */
      overflow: hidden; /* ¡Prohíbe el scroll! */
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #080c14;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* Distribuye el espacio: arriba, medio, abajo */
    }

    .background-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    .background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background: url('https://i.postimg.cc/76HtY8hg/deportes15.jpg') no-repeat center center;
      background-size: cover;
      animation: slideBg 60s linear infinite;
      filter: blur(8px);
      opacity: 0.6;
    }

    .background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.4) 0%, rgba(8, 12, 20, 1) 100%);
      z-index: 2;
    }

    @keyframes slideBg {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* 🔥 AJUSTE DEL CONTENEDOR CENTRAL 🔥 */
    .container {
      text-align: center;
      z-index: 10;
      padding: 1rem;
      width: 100%;
      max-width: 900px;
      /* En lugar de margin-top estático, usamos flex para centrarlo verticalmente */
      flex: 1; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Centra el contenido en el medio de la pantalla */
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem); /* 🔥 Tamaño fluido: se adapta a la pantalla */
      font-weight: 900;
      margin-bottom: 0.5rem;
      line-height: 1.1;
      animation: fadeIn 1.5s ease-in-out;
      background: linear-gradient(to right, #fff 0%, #a3e635 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.5rem); /* 🔥 Tamaño fluido */
      font-weight: 300;
      line-height: 1.5;
      margin-bottom: 2rem; /* Reducido para ahorrar espacio */
      animation: fadeIn 2s ease-in-out;
      color: #94a3b8;
      max-width: 700px;
      padding: 0 1rem;
    }

    .btn-ingresar {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 3rem; /* Ligeramente más compacto */
      font-size: clamp(1.5rem, 3vw, 2.2rem); /* 🔥 Tamaño fluido */
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #10b981 0%, #00d4ff 100%);
      border-radius: 50px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
      animation: pulseBtn 2.5s infinite ease-in-out, shineBtn 4s infinite 2s;
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem; /* Espacio antes del mini-catálogo */
    }

    .btn-ingresar::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(45deg);
      animation: shineLoop 3s infinite;
    }

    @keyframes shineLoop {
      0% { left: -100%; }
      20% { left: 100%; }
      100% { left: 100%; }
    }

    .btn-ingresar:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    @keyframes pulseBtn {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(16, 185, 129, 0.5); }
      50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(0, 212, 255, 0.7); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .background-animations {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(0, 212, 255, 0.2);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
      mix-blend-mode: screen;
      filter: blur(2px);
    }

    .particle-1 { width: 80px; height: 80px; top: 20%; left: 15%; animation-delay: 0s; }
    .particle-2 { width: 40px; height: 40px; top: 70%; left: 80%; animation-delay: 3s; }
    .particle-3 { width: 60px; height: 60px; top: 50%; left: 50%; animation-delay: 6s; }
    .particle-4 { width: 20px; height: 20px; top: 10%; left: 90%; animation-delay: 9s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(30px, -30px) scale(1.1); opacity: 0.6; }
      100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    }

    .mini-catalog {
      display: flex;
      gap: 20px; /* Reducido para asegurar que quepa */
      z-index: 10;
      animation: fadeIn 3s ease-in-out;
      flex-wrap: wrap; /* Permite que bajen si no caben en línea */
      justify-content: center;
    }

    .catalog-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .catalog-item i {
      font-size: 1.8rem;
      color: #fff;
      filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
    }

    /* 🔥 AJUSTE DEL FOOTER 🔥 */
    footer {
      width: 100%;
      padding: 1.5rem; /* Padding reducido para dar más espacio arriba */
      text-align: center;
      z-index: 10;
      /* Ya no necesita margin-top: auto porque el body usa justify-content: space-between */
    }

    .social-icons {
      display: flex;
      justify-content: center;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
      margin: 0 0.5rem;
      border-radius: 12px;
      color: #fff;
      font-size: 1.5rem;
      text-decoration: none;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .social-icons a:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
      border: 1px solid rgba(16, 185, 129, 0.5);
      color: #a3e635;
    }
  </style>
  
</head>
<body ondragstart="return false;">

  <div class="background-wrapper">
    <div class="background-image"></div>
    <div class="background-overlay"></div>
  </div>

  <div class="container">
    <h1>SportLive Premium:<br>TV, Deportes y Cine</h1>
    <p>Accede a la mejor experiencia de streaming. Todos los partidos, estrenos de cine y canales premium en un solo lugar.</p>
    
    <a href="home.html" class="btn-ingresar">
       <i class="fas fa-play-circle"></i> INGRESAR
    </a>

    <div class="mini-catalog">
        <div className="catalog-item">
            <i class="fas fa-futbol"></i>
            Deportes En Vivo
        </div>
        <div className="catalog-item">
            <i class="fas fa-film"></i>
            Estrenos Cine
        </div>
        <div className="catalog-item">
            <i class="fas fa-tv"></i>
            TV Premium
        </div>
    </div>
  </div>

  <div class="background-animations">
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com/" target="_blank" class="facebook" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/" target="_blank" class="instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@" target="_blank" class="tiktok" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.youtube.com/" target="_blank" class="youtube" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://twitter.com/" target="_blank" class="twitter" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://www.twitch.tv/" target="_blank" class="twitch" aria-label="Twitch"><i class="fab fa-twitch"></i></a>
      <a href="https://t.me.com/" target="_blank" class="telegram" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a>
      <a href="https://wa.me/+1234567890" target="_blank" class="whatsapp" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
      

    </div>
  </footer>

  <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px; padding: 15px; z-index: 99999; box-shadow: 0 20px 40px rgba(0,0,0,0.9); align-items: center; justify-content: space-between; gap: 15px; font-family: 'Outfit', sans-serif;">
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://ui-avatars.com/api/?name=SL&background=3b82f6&color=fff&size=64" style="width: 45px; height: 45px; border-radius: 10px;" alt="Icon">
        <div>
            <h4 style="margin: 0; color: #fff; font-size: 14px; font-weight: 800;">SportLive Premium</h4>
            <p style="margin: 0; color: #94a3b8; font-size: 11px; margin-top: 2px;">Instala para acceso rápido y sin publicidad</p>
        </div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: bold; cursor: pointer; padding: 5px;"><i class="fas fa-times"></i></button>
        <button id="btn-instalar-app" style="background: #10b981; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">INSTALAR</button>
    </div>
  </div>

  <script>
    // 1. Registrar el Service Worker Básico
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('PWA Service Worker Activado');
            }).catch(err => console.log('Error SW:', err));
        });
    }

    // 2. Lógica de Instalación PWA
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const btnInstalar = document.getElementById('btn-instalar-app');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
    });

    btnInstalar.addEventListener('click', async () => {
        installBanner.style.display = 'none';
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Instalación: ${outcome}`);
            deferredPrompt = null;
        }
    });

    // Detectar iOS
    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test( userAgent );
    }
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
        installBanner.style.display = 'flex';
        btnInstalar.innerHTML = 'VER CÓMO';
        btnInstalar.addEventListener('click', () => {
            alert("Para instalar en iPhone/iPad:\n1. Toca el ícono de 'Compartir' (el cuadrado con la flecha hacia arriba).\n2. Selecciona 'Agregar a Inicio'.");
        });
    }
  </script>

</body>
</html>
