<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SportLive Premium | Eventos Deportivos, TV y Cine en VIVO Gratis</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0e17">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=SL&background=3b82f6&color=fff&size=192">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" href="https://i.postimg.cc/fyL6vn3H/unnamed-1.png" type="image/x-icon">

  <meta name="description" content="Accede a la mejor plataforma de streaming. SportLive Premium te ofrece canales de TV online en vivo, eventos deportivos exclusivos y estrenos de cine gratis por internet.">
  <meta name="keywords" content="Fútbol Libre, canales de TV online, eventos deportivos, streaming gratis, cine online, tv en vivo">
  <meta name="author" content="SportLive">
  <meta property="og:site_name" content="SPORTLIVE PREMIUM | STREAMING ONLINE">
  <meta property="og:url" content="https://oleadatvpremium.com">
  <meta property="og:image" content="https://i.postimg.cc/fyL6vn3H/unnamed-1.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 🔥 AJUSTE PARA EVITAR SCROLL Y ADAPTARSE A LA PANTALLA PERFECTAMENTE 🔥 */
    html, body {
      width: 100%;
      height: 100%; 
      height: 100dvh; 
      overflow: hidden; 
      background-color: #0a0e17; /* Tono profundo ultra oscuro premium (como BENEFT) */
    }

    body {
      font-family: 'Outfit', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Centrado vertical estricto */
    }

    /* 🔥 Fondo de deportes unificado y sutil 🔥 */
    .background-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    .background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://i.postimg.cc/76HtY8hg/deportes15.jpg') no-repeat center center;
      background-size: cover;
      filter: blur(100px); /* 🔥 Desenfoque máximo para textura, no imagen */
      opacity: 0.1; /* 🔥 Opacidad mínima, casi invisible */
    }

    /* 🔥 Superposición radial para modo app premium */
    .background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(10, 14, 23, 0.7) 0%, rgba(8, 12, 20, 1) 100%);
      z-index: 2;
    }

    /* 🔥 AJUSTE DEL CONTENEDOR CENTRAL 🔥 */
    .container {
      text-align: center;
      z-index: 10;
      padding: 1rem;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 LOGO ESTILIZADO PRO (ESTILO BENEFT) */
    .app-logo {
        font-size: clamp(3rem, 10vw, 6rem); /* Grande y confidente */
        font-weight: 900;
        letter-spacing: -2px;
        line-height: 1;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #fff 0%, #d1d5db 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fadeInLogo 1.5s ease-out;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 🔥 El acento neón de color cian al estilo BENEFT */
    .app-logo span {
        font-size: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 5px;
        color: #00d4ff;
        filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.7));
        margin-top: -10px;
    }

    @keyframes fadeInLogo {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    p {
      font-size: clamp(1rem, 2vw, 1.4rem); /* Tamaño fluido */
      font-weight: 300;
      line-height: 1.5;
      margin-bottom: 3rem; /* Espacio antes del botón */
      animation: fadeIn 2s ease-in-out 0.3s both;
      color: #94a3b8;
      max-width: 600px;
      padding: 0 1rem;
    }

    /* 🔥 BOTÓN ULTRA PRO CON GLOW LED (ESTILO APP CONTROL) */
    .btn-ingresar {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      padding: 1.2rem 4rem; /* Ligeramente más compacto */
      font-size: clamp(1.5rem, 3.5vw, 2.5rem); /* Tamaño fluido */
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%); /* Fondo oscuro */
      border-radius: 12px; /* Más cuadrado moderno */
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); /* Glow Cyan neón inicial */
      animation: pulseBtn 2.5s infinite ease-in-out;
      position: relative;
      overflow: hidden;
      margin-bottom: 3rem; /* Espacio antes del mini-catálogo */
    }

    .btn-ingresar:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.8); /* Glow Cyan en hover */
      border: 1px solid rgba(0, 212, 255, 0.5);
    }

    .btn-ingresar i {
        color: #00d4ff; /* Icono neón */
        filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.7));
    }

    @keyframes pulseBtn {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
      50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(0, 212, 255, 0.7); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mini-catalog {
      display: flex;
      gap: 30px; 
      z-index: 10;
      animation: fadeIn 3s ease-in-out 0.6s both;
      justify-content: center;
    }

    .catalog-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .catalog-item i {
      font-size: 2rem;
      color: #fff;
      filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
    }

    /* 🔥 AJUSTE DEL FOOTER PRO (ESTILO CRISTAL LIMPIO) 🔥 */
    footer {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      z-index: 10;
      animation: fadeIn 2s ease-out 1s both;
    }

    .social-icons {
      display: flex;
      justify-content: center;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
      margin: 0 0.5rem;
      border-radius: 12px;
      color: #fff;
      font-size: 1.5rem;
      text-decoration: none;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
    }

    .social-icons a:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
      border: 1px solid rgba(0, 212, 255, 0.5);
      color: #00d4ff; /* Texto lima en hover */
    }
  </style>
</head>
<body ondragstart="return false;">

  <div class="background-wrapper">
    <div class="background-image"></div>
    <div class="background-overlay"></div>
  </div>

  <div class="container">
    <div class="app-logo">
        SportLive
        <span>PREMIUM</span>
    </div>
    
    <p>Tu portal definitivo a TV Premium, Deportes en Vivo y Cine.</p>
    
    <a href="home.html" class="btn-ingresar">
       <i class="fas fa-play"></i> INGRESAR
    </a>

    <div class="mini-catalog">
        <div className="catalog-item">
            <i class="fas fa-futbol"></i>
            Deportes
        </div>
        <div className="catalog-item">
            <i class="fas fa-film"></i>
            Cine
        </div>
        <div className="catalog-item">
            <i class="fas fa-tv"></i>
            TV
        </div>
    </div>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com/" target="_blank" class="facebook" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/" target="_blank" class="instagram" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@" target="_blank" class="tiktok" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>
  </footer>

  <div id="pwa-install-banner" style="display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 16px; padding: 15px; z-index: 99999; box-shadow: 0 20px 40px rgba(0,0,0,0.9); align-items: center; justify-content: space-between; gap: 15px; font-family: 'Outfit', sans-serif;">
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="https://ui-avatars.com/api/?name=SL&background=3b82f6&color=fff&size=64" style="width: 45px; height: 45px; border-radius: 10px;" alt="Icon">
        <div>
            <h4 style="margin: 0; color: #fff; font-size: 14px; font-weight: 800;">SportLive Premium</h4>
            <p style="margin: 0; color: #94a3b8; font-size: 11px; margin-top: 2px;">Instala para acceso rápido y sin publicidad</p>
        </div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button onclick="document.getElementById('pwa-install-banner').style.display='none'" style="background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: bold; cursor: pointer; padding: 5px;"><i class="fas fa-times"></i></button>
        <button id="btn-instalar-app" style="background: #111827; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);">INSTALAR</button>
    </div>
  </div>

  <script>
    // 1. Registrar el Service Worker Básico
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('PWA Service Worker Activado');
            }).catch(err => console.log('Error SW:', err));
        });
    }

    // 2. Lógica de Instalación PWA
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const btnInstalar = document.getElementById('btn-instalar-app');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'flex';
    });

    btnInstalar.addEventListener('click', async () => {
        installBanner.style.display = 'none';
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Instalación: ${outcome}`);
            deferredPrompt = null;
        }
    });

    // Detectar iOS
    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test( userAgent );
    }
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
        installBanner.style.display = 'flex';
        btnInstalar.innerHTML = 'VER CÓMO';
        btnInstalar.addEventListener('click', () => {
            alert("Para instalar en iPhone/iPad:\n1. Toca el ícono de 'Compartir' (el cuadrado con la flecha hacia arriba).\n2. Selecciona 'Agregar a Inicio'.");
        });
    }
  </script>

</body>
</html>
