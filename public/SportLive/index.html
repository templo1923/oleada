<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SportLive Premium | TV, Cine y Deportes en VIVO Gratis</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0e17">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100dvh;
overflow:hidden;
background:#0a0e17;
font-family:'Outfit',sans-serif;
color:#fff;
}

/* 🔥 BACKGROUND PRO */
.background-wrapper{
position:fixed;
width:100%;
height:100%;
z-index:1;
overflow:hidden;
}

.mesh-gradient::after{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(0,212,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(168,85,247,0.15), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(16,185,129,0.1), transparent 50%);
animation:moveBg 25s linear infinite;
filter:blur(100px);
}

@keyframes moveBg{
0%{transform:translate(0,0)}
50%{transform:translate(-10%,-10%)}
100%{transform:translate(0,0)}
}

/* 🔥 SPOTLIGHT */
.spotlight{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
z-index:2;
background:radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(0,212,255,0.12), transparent 40%);
}

/* CONTENIDO */
.container{
z-index:10;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
animation:floatUI 6s ease-in-out infinite;
}

@keyframes floatUI{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

/* LOGO */
.app-logo{
font-size:clamp(3rem,10vw,6rem);
font-weight:900;
background:linear-gradient(to right,#fff,#d1d5db);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.app-logo span{
display:block;
font-size:1rem;
letter-spacing:5px;
color:#00d4ff;
}

/* SUBTITLE */
.subtitle{
color:#94a3b8;
margin:20px 0 40px;
}

/* GRID */
.nav-grid{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

/* CARD */
.nav-card{
width:150px;
height:150px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
color:#cbd5e1;
background:rgba(255,255,255,0.02);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.05);
position:relative;
transition:.3s;
}

/* 🔥 BORDER GLOW */
.nav-card::after{
content:"";
position:absolute;
inset:0;
border-radius:20px;
padding:1px;
background:linear-gradient(120deg,transparent,rgba(0,212,255,.4),transparent);
-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
opacity:0;
transition:.4s;
}

.nav-card:hover::after{opacity:1}

.nav-card:hover{
transform:translateY(-10px) scale(1.05);
}

.nav-card:active{
transform:scale(.95);
}

.nav-card i{
font-size:2.5rem;
}

/* COLORES */
.sports:hover{color:#10b981}
.movies:hover{color:#00d4ff}
.tv:hover{color:#a855f7}

/* INSTALL */
.install{
display:none;
color:#00d4ff;
}

/* FOOTER */
footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
}

.social-icons a{
margin:0 10px;
color:#94a3b8;
font-size:1.3rem;
}

.social-icons a:hover{
color:#00d4ff;
}

/* MOBILE */
@media(max-width:768px){
.nav-card{
width:110px;
height:120px;
}
}

/* AUDIO */
audio{display:none}

</style>
</head>

<body>

<div class="background-wrapper">
<div class="mesh-gradient"></div>
</div>

<div class="spotlight"></div>

<div class="container">

<div class="app-logo">
SportLive
<span>PREMIUM</span>
</div>

<p class="subtitle">¿Qué te gustaría ver hoy?</p>

<div class="nav-grid">
<a href="agenda.html" class="nav-card sports">
<i class="fas fa-futbol"></i>
<span>Deportes</span>
</a>

<a href="peliculas.html" class="nav-card movies">
<i class="fas fa-film"></i>
<span>Cine</span>
</a>

<a href="television.html" class="nav-card tv">
<i class="fas fa-tv"></i>
<span>TV</span>
</a>

<a href="#" id="btn-instalar-integrated" class="nav-card install">
<i class="fas fa-download"></i>
<span>Instalar</span>
</a>
</div>

</div>

<footer>
<div class="social-icons">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
</div>
</footer>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

/* 🔥 SPOTLIGHT */
document.addEventListener("mousemove",(e)=>{
document.documentElement.style.setProperty("--x",e.clientX+"px");
document.documentElement.style.setProperty("--y",e.clientY+"px");
});

/* 🔊 SONIDO */
document.querySelectorAll(".nav-card").forEach(card=>{
card.addEventListener("click",()=>{
document.getElementById("clickSound").play();
});
});

/* PWA */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('./sw.js');
}

let deferredPrompt;
const installCard=document.getElementById('btn-instalar-integrated');

window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
installCard.style.display='flex';
});

installCard.addEventListener('click',async(e)=>{
e.preventDefault();
if(deferredPrompt){
deferredPrompt.prompt();
const {outcome}=await deferredPrompt.userChoice;
if(outcome==='accepted'){
installCard.style.display='none';
}
deferredPrompt=null;
}
});

/* iOS */
const isIos=()=>/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone=()=>('standalone'in window.navigator)&&window.navigator.standalone;

if(isIos()&&!isStandalone()){
installCard.style.display='flex';
installCard.innerHTML='<i class="fas fa-info-circle"></i><span>Guía</span>';
installCard.onclick=()=>{
alert("En iPhone: compartir > añadir a inicio");
};
}

</script>

</body>
</html>
