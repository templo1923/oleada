<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SportLive Premium | TV, Cine y Deportes en VIVO</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#030712">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png">
  <link rel="shortcut icon" href="./icons/favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    html, body {
      width: 100%; height: 100%; height: 100dvh; overflow: hidden; 
      background-color: #030712; font-family: 'Outfit', sans-serif; color: #fff;
    }

    body { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

    /* 🔥 FONDO "VACANO" ORIGINAL (CONFIGURACIÓN BASE PARA MÓVIL) 🔥 */
    .background-wrapper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; background: #030712;
    }

    .background-image {
      position: absolute; top: 0; left: 0; width: 150%; height: 100%; 
      background: url('https://i.pinimg.com/564x/23/9f/de/239fde6c47ab5eea81a0ccffe103d714.jpg') no-repeat center center;
      background-size: cover;
      animation: slideBg 60s linear infinite; 
      filter: blur(2px); 
      opacity: 0.4; 
    }

    .background-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(3, 7, 18, 0.5) 0%, rgba(3, 7, 18, 0.95) 100%); 
      z-index: 2;
    }

    @keyframes slideBg {
      0% { transform: translateX(0); }
      100% { transform: translateX(-25%); } 
    }

    /* 🔥 LUCES DE NEÓN (AURORA) Y MALLA 🔥 */
    .bg-aurora {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 150vw; height: 150vh;
      background: 
        radial-gradient(circle at 15% 30%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
      filter: blur(60px); z-index: 3; animation: auroraPulse 15s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    .bg-grid {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 30px 30px; z-index: 4;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    @keyframes auroraPulse {
      0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { transform: translate(-50%, -50%) scale(1.1) rotate(3deg); }
    }

    .container {
      position: relative; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; width: 100%; max-width: 1000px; padding: 0 1rem;
    }

    /* 🔥 LOGO Y TEXTOS 🔥 */
    .brand-logo {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; position: relative;
      animation: fadeInDown 1s ease-out;
    }

    .logo-icon {
      width: 65px; height: 65px; margin-bottom: 10px;
      filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.6));
    }

    .brand-logo h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; letter-spacing: -1.5px; line-height: 0.9;
      background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
    }

    .premium-badge {
      font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 6px; color: #00d4ff;
      background: rgba(0, 212, 255, 0.1); padding: 3px 12px; border-radius: 50px;
      border: 1px solid rgba(0, 212, 255, 0.3); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      margin-top: 5px; backdrop-filter: blur(10px);
    }

    /* 🔥 TARJETAS DE NAVEGACIÓN 🔥 */
    .nav-grid {
      display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
      opacity: 0; animation: fadeInUp 1s ease-out 0.4s forwards; margin-top: 1rem;
    }

    .nav-card {
      position: relative; width: 140px; height: 180px; border-radius: 20px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-decoration: none; overflow: hidden;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-card::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: skewX(-20deg); transition: 0.5s;
    }

    .nav-card i { font-size: 2.8rem; color: #cbd5e1; margin-bottom: 12px; transition: all 0.4s ease; z-index: 2; }
    .nav-card .card-title { font-size: 1rem; font-weight: 800; color: #f1f5f9; text-transform: uppercase; z-index: 2; }
    .nav-card .card-sub { font-size: 0.6rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; z-index: 2; transition: 0.4s; }

    .nav-card:hover { transform: translateY(-10px); }
    .nav-card:hover::before { left: 200%; transition: 0.7s; }

    .nav-card.sports:hover { border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px rgba(16, 185, 129, 0.2); }
    .nav-card.sports:hover i { color: #10b981; filter: drop-shadow(0 0 10px #10b981); transform: scale(1.1); }
    .nav-card.sports:hover .card-sub { color: #10b981; }

    .nav-card.movies:hover { border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0, 212, 255, 0.2); }
    .nav-card.movies:hover i { color: #00d4ff; filter: drop-shadow(0 0 10px #00d4ff); transform: scale(1.1); }
    .nav-card.movies:hover .card-sub { color: #00d4ff; }

    .nav-card.tv:hover { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px rgba(168, 85, 247, 0.2); }
    .nav-card.tv:hover i { color: #a855f7; filter: drop-shadow(0 0 10px #a855f7); transform: scale(1.1); }
    .nav-card.tv:hover .card-sub { color: #a855f7; }

    .nav-card.install { background: linear-gradient(180deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 212, 255, 0.02) 100%); border-top: 1px solid rgba(0, 212, 255, 0.4); display: none; }
    .nav-card.install i { color: #00d4ff; animation: pulseInstall 2s infinite; }
    .nav-card.install .card-sub { color: #00d4ff; }
    .nav-card.install:hover { border-color: rgba(0, 212, 255, 0.6); box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 30px rgba(0, 212, 255, 0.25); }

    @keyframes pulseInstall { 0%, 100% { filter: drop-shadow(0 0 5px rgba(0,212,255,0.5)); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px rgba(0,212,255,0.9)); transform: scale(1.05); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    /* 🔥 FOOTER INVISIBLE 🔥 */
    footer { position: absolute; bottom: 1.5rem; width: 100%; text-align: center; z-index: 10; opacity: 0; animation: fadeInUp 1s ease-out 0.6s forwards; }
    .social-icons { display: flex; justify-content: center; gap: 15px; }
    .social-icons a { display: flex; align-items: center; justify-content: center; width: 35px; height: 35px; border-radius: 50%; color: #94a3b8; font-size: 1.1rem; text-decoration: none; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
    .social-icons a:hover { color: #fff; background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }

    /* 🔥 FIX PC: AJUSTE DE IMAGEN PARA PANTALLAS ANCHAS 🔥 */
    @media (min-width: 769px) {
      .background-image {
        width: 100%; /* Evitamos estirarla exageradamente a los lados */
        background-position: center 15%; /* Enfocamos la cabeza/torso y no el centro exacto */
        animation: zoomBgPC 30s ease-in-out infinite alternate; /* En PC usamos zoom en lugar de paneo lateral */
      }
    }

    @keyframes zoomBgPC {
      0% { transform: scale(1); }
      100% { transform: scale(1.05); } /* Zoom ultra sutil (Efecto Ken Burns) */
    }

    /* 🔥 RESPONSIVE MÓVIL 🔥 */
    @media (max-width: 768px) {
      .brand-logo { margin-bottom: 1.5rem; }
      .logo-icon { width: 55px; height: 55px; }
      .nav-grid { gap: 12px; }
      .nav-card { width: 105px; height: 140px; border-radius: 16px; }
      .nav-card i { font-size: 2.2rem; margin-bottom: 10px; }
      .nav-card .card-title { font-size: 0.85rem; }
      .nav-card .card-sub { font-size: 0.55rem; }
    }
  </style>
</head>
<body ondragstart="return false;">

  <div class="background-wrapper">
    <div class="background-image"></div>
    <div class="background-overlay"></div>
    <div class="bg-aurora"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="container">
    
<div class="brand-logo">
      <img src="./icons/icon-512x512.png" class="logo-icon" alt="Logo SportLive">
      <h1>SportLive</h1>
      <span class="premium-badge">Premium</span>
    </div>
    
    <div class="nav-grid">
        <a href="agenda" class="nav-card sports">
            <i class="fas fa-futbol"></i>
            <span class="card-title">Deportes</span>
            <span class="card-sub">En Vivo</span>
        </a>
        <a href="peliculas" class="nav-card movies">
            <i class="fas fa-film"></i>
            <span class="card-title">Cine</span>
            <span class="card-sub">4K VOD</span>
        </a>
        <a href="television" class="nav-card tv">
            <i class="fas fa-tv"></i>
            <span class="card-title">Televisión</span>
            <span class="card-sub">24/7 HD</span>
        </a>
        
        <a href="#" id="btn-instalar-integrated" class="nav-card install">
            <i class="fas fa-cloud-download-alt"></i>
            <span class="card-title">App</span>
            <span class="card-sub">Instalar Gratis</span>
        </a>
    </div>

  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com/" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('Error SW:', err)); });
    }

    let deferredPrompt;
    const installCard = document.getElementById('btn-instalar-integrated');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e; installCard.style.display = 'flex';
    });

    installCard.addEventListener('click', async (e) => {
        e.preventDefault();
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') { installCard.style.display = 'none'; }
            deferredPrompt = null;
        }
    });

    const isIos = () => /iphone|ipad|ipod/.test( window.navigator.userAgent.toLowerCase() );
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
        installCard.style.display = 'flex'; installCard.querySelector('.card-sub').innerHTML = 'Ver Guía';
        installCard.addEventListener('click', (e) => {
            e.preventDefault(); alert("Para instalar en iPhone/iPad:\n1. Toca el ícono de 'Compartir'.\n2. Selecciona 'Agregar a Inicio'.");
        });
    }
  </script>

</body>
</html>
