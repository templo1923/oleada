<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SportLive Premium | TV, Cine y Deportes en VIVO Gratis</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0e17">
  <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=SL&background=3b82f6&color=fff&size=192">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="icon" href="https://i.postimg.cc/fyL6vn3H/unnamed-1.png" type="image/x-icon">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 🔥 AJUSTE TOTAL PARA NO-SCROLL ADAPTATIVO (clamp/dvh) 🔥 */
    html, body {
      width: 100%;
      height: 100%; 
      height: 100dvh; 
      overflow: hidden; 
      background-color: #0a0e17; /* Fondo Charcoal Profundo ultra oscuro */
    }

    body {
      font-family: 'Outfit', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center; /* Centrado vertical estricto */
    }

    /* 🔥 FONDO "VACANO" SUPREMO (MESH GRADIENT ANIMADO + TEXTURA ORIGINAL) 🔥 */
    .background-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    /* Textura original ultra desenfocada */
    .background-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://i.postimg.cc/76HtY8hg/deportes15.jpg') no-repeat center center;
      background-size: cover;
      filter: blur(150px); 
      opacity: 0.05; 
      z-index: 2;
    }

    /* 🔥 Mesh Gradient Animado puro CSS 🔥 */
    .mesh-gradient {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0e17;
      z-index: 1;
    }
    
    .mesh-gradient::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        radial-gradient(at 10% 10%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 90% 10%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 50% 90%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
      filter: blur(80px);
      animation: meshAnim 20s infinite alternate;
    }

    @keyframes meshAnim {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10px, -10px) scale(1.1); }
    }

    .container {
      text-align: center;
      z-index: 10;
      padding: 1rem;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 LOGO ESTILIZADO PRO (ESTILO BENEFT - BOLD & CONFIDENT) */
    .app-logo {
        font-size: clamp(3rem, 10vw, 6rem); 
        font-weight: 900;
        letter-spacing: -3px; /* Más bold, más junto */
        line-height: 1;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #fff 0%, #d1d5db 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fadeInLogo 1.5s ease-out;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .app-logo span {
        font-size: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 5px;
        color: #00d4ff; /* Cian Neón */
        filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.7));
        margin-top: -10px;
    }

    @keyframes fadeInLogo {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    p.subtitle {
      font-size: clamp(1rem, 2vw, 1.4rem); 
      font-weight: 300;
      margin-bottom: 3.5rem; /* Más espacio para las tarjetas */
      animation: fadeIn 2s ease-in-out 0.3s both;
      color: #94a3b8;
      max-width: 600px;
      padding: 0 1rem;
    }

    /* 🔥 TARJETAS DE NAVEGACIÓN PRO (SMART TV STYLE + GLASSMORPHISM) 🔥 */
    .nav-grid {
      display: flex;
      gap: 20px;
      z-index: 10;
      animation: fadeIn 2s ease-in-out 0.5s both;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 160px;
      height: 160px;
      background: rgba(255, 255, 255, 0.01); /* Fondo ultra suave */
      border: 1px solid rgba(255, 255, 255, 0.05); /* Borde ultra fino */
      border-radius: 24px;
      text-decoration: none;
      color: #cbd5e1;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      backdrop-filter: blur(10px); /* Efecto Glassmorphism */
      position: relative;
      overflow: hidden;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .nav-card i {
      font-size: 3.5rem;
      color: #cbd5e1;
      transition: all 0.3s ease;
      z-index: 2;
    }

    .nav-card span {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 2;
      transition: all 0.3s ease;
    }

    /* HOVER: DEPORTES (Verde Neón LED) */
    .nav-card.sports:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: rgba(16, 185, 129, 0.6);
      box-shadow: 0 15px 35px rgba(16, 185, 129, 0.2), inset 0 0 20px rgba(16, 185, 129, 0.1);
    }
    .nav-card.sports:hover i { color: #10b981; filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.8)); }
    .nav-card.sports:hover span { color: #fff; }
    .nav-card.sports:hover::before { opacity: 1; }

    /* HOVER: CINE (Cian Neón LED) */
    .nav-card.movies:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: rgba(0, 212, 255, 0.6);
      box-shadow: 0 15px 35px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.1);
    }
    .nav-card.movies:hover i { color: #00d4ff; filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.8)); }
    .nav-card.movies:hover span { color: #fff; }
    .nav-card.movies:hover::before { opacity: 1; }

    /* HOVER: TV (Morado Neón LED) */
    .nav-card.tv:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: rgba(168, 85, 247, 0.6);
      box-shadow: 0 15px 35px rgba(168, 85, 247, 0.2), inset 0 0 20px rgba(168, 85, 247, 0.1);
    }
    .nav-card.tv:hover i { color: #a855f7; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.8)); }
    .nav-card.tv:hover span { color: #fff; }
    .nav-card.tv:hover::before { opacity: 1; }

    /* 🔥 SOLUCIÓN AL BANNER ATRAVESADO: TARJETA DE INSTALACIÓN INTEGRADA 🔥 */
    .nav-card.install {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%); /* Fondo más oscuro */
      border: 1px solid rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15); /* Brillo cian neón inicial */
      display: none; /* Oculto por defecto */
    }
    
    .nav-card.install i { color: #00d4ff; filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.7)); }
    .nav-card.install span { color: #fff; }
    
    .nav-card.install:hover {
      transform: translateY(-10px) scale(1.05);
      border-color: rgba(0, 212, 255, 0.6);
      box-shadow: 0 15px 35px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
    }
    
    /* Pequeña animación de pulso para llamar la atención en la tarjeta de instalación */
    .nav-card.install i { animation: pulseIcon 3s infinite; }
    @keyframes pulseIcon { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      text-align: center;
      z-index: 10;
      animation: fadeIn 2s ease-out 1s both;
    }

    .social-icons {
      display: flex;
      justify-content: center;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
      margin: 0 0.5rem;
      border-radius: 12px;
      color: #94a3b8;
      font-size: 1.5rem;
      text-decoration: none;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
    }

    .social-icons a:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
      border: 1px solid rgba(0, 212, 255, 0.5);
      color: #00d4ff; 
    }

    /* 🔥 RESPONSIVE (MÓVIL) 🔥 */
    @media (max-width: 768px) {
      .nav-grid { gap: 12px; margin-top: 1rem; }
      .nav-card { width: 105px; height: 120px; gap: 10px; border-radius: 20px; }
      .nav-card i { font-size: 2.5rem; }
      .nav-card span { font-size: 0.75rem; letter-spacing: 0.5px; }
      p.subtitle { margin-bottom: 2rem; }
    }
  </style>
</head>
<body ondragstart="return false;">

  <div class="background-wrapper">
    <div class="mesh-gradient"></div>
    <div class="background-image"></div>
    <div class="background-overlay"></div>
  </div>

  <div class="container">
    <div class="app-logo">
        SportLive
        <span>PREMIUM</span>
    </div>
    
    <p class="subtitle">¿Qué te gustaría ver hoy?</p>
    
    <div class="nav-grid">
        <a href="agenda.html" class="nav-card sports">
            <i class="fas fa-futbol"></i>
            <span>Deportes</span>
        </a>
        <a href="peliculas.html" class="nav-card movies">
            <i class="fas fa-film"></i>
            <span>Cine VOD</span>
        </a>
        <a href="television.html" class="nav-card tv">
            <i class="fas fa-tv"></i>
            <span>TV en Vivo</span>
        </a>
        
        <a href="#" id="btn-instalar-integrated" class="nav-card install">
            <i class="fas fa-download"></i>
            <span>Instalar</span>
        </a>
    </div>
  </div>

  <footer>
    <div class="social-icons">
      <a href="https://www.facebook.com/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@" target="_blank" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>
  </footer>

  <script>
    // 1. Registrar el Service Worker Básico
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('PWA Service Worker Activado');
            }).catch(err => console.log('Error SW:', err));
        });
    }

    // 2. 🔥 LÓGICA DE INSTALACIÓN PWA INTEGRADA (SOLUCIÓN A TU PROBLEMA) 🔥
    let deferredPrompt;
    // Capturamos la nueva tarjeta integrada
    const installCard = document.getElementById('btn-instalar-integrated');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // SiChrome/Android detectan que es instalable, mostramos la tarjeta integrated en el menú
        installCard.style.display = 'flex';
    });

    installCard.addEventListener('click', async (e) => {
        e.preventDefault(); // Evitamos que el enlace vacio recargue la página
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Instalación: ${outcome}`);
            // Si el usuario acepta o cancela, ocultamos la tarjeta para no saturar
            if (outcome === 'accepted') {
                installCard.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // Detectar iOS (Apple no deja instalar automático, hay que enseñarles)
    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test( userAgent );
    }
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
        // En iOS también mostramos la tarjeta integrada
        installCard.style.display = 'flex';
        // Cambiamos el texto y el ícono para que sea un instructivo
        installCard.querySelector('span').innerHTML = 'Ver Guía';
        installCard.querySelector('i').className = 'fas fa-info-circle';
        
        installCard.addEventListener('click', (e) => {
            e.preventDefault();
            alert("Para instalar en iPhone/iPad:\n1. Toca el ícono de 'Compartir' (el cuadrado con la flecha hacia arriba).\n2. Selecciona 'Agregar a Inicio'.");
        });
    }
  </script>

</body>
</html>
